pre-commit:
  parallel: false
  commands:
    fmt:
      glob: '**/*.{js,jsx,ts,tsx,json,yml,yaml,md}'
      run: yarn format {staged_files}
      stage_fixed: true
    fmt-config:
      glob: '.ox*.json'
      run: yarn format {staged_files}
      stage_fixed: true
    lint:
      glob: '**/*.{js,ts,jsx,tsx}'
      run: yarn lint {staged_files}
    types:
      glob: '**/*.{js,jsx,ts,tsx}'
      run: yarn typecheck
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: yarn commitlint --edit {1}
